<svg viewBox="0 0 320 64" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ══════════════════════════════════════════════ -->
  <!--  ICON MARK — three ascending overlapping diamonds -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- D1 · back layer (ghost) -->
  <polygon
    points="14,30 26,42 14,54 2,42"
    fill="#C9A84C" fill-opacity="0.10"
    stroke="#C9A84C" stroke-width="1.2" stroke-opacity="0.45"
    stroke-linejoin="miter"
  />

  <!-- D2 · mid layer -->
  <polygon
    points="28,18 40,30 28,42 16,30"
    fill="#C9A84C" fill-opacity="0.28"
    stroke="#C9A84C" stroke-width="1.4" stroke-opacity="0.70"
    stroke-linejoin="miter"
  />

  <!-- D3 · front layer (solid) -->
  <polygon
    points="42,6 54,18 42,30 30,18"
    fill="#C9A84C" fill-opacity="0.82"
    stroke="#C9A84C" stroke-width="1.8" stroke-opacity="1"
    stroke-linejoin="miter"
  />

  <!-- Ascending spine -->
  <polyline
    points="14,42 28,30 42,18"
    stroke="#C9A84C" stroke-width="0.7" stroke-opacity="0.18"
    stroke-dasharray="2,3.5" fill="none"
  />

  <!-- Apex node -->
  <circle cx="42" cy="6" r="2.2" fill="#C9A84C"/>

  <!-- Inner accent on front diamond -->
  <polygon
    points="42,11 48,17 42,23 36,17"
    fill="none"
    stroke="#C9A84C" stroke-width="0.7" stroke-opacity="0.4"
    stroke-linejoin="miter"
  />

  <!-- ══════════════════════════════════════════════ -->
  <!--  WORDMARK                                      -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- "IM" bold serif -->
  <text
    x="70" y="36"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28" font-weight="700"
    fill="#C9A84C"
    letter-spacing="-0.5"
  >IM</text>

  <!-- "Solutions" light sans -->
  <text
    x="106" y="36"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="20" font-weight="300"
    fill="#C9A84C"
    letter-spacing="1.5"
  >Solutions</text>

  <!-- Divider line -->
  <line x1="70" y1="42" x2="268" y2="42" stroke="#C9A84C" stroke-width="0.5" opacity="0.35"/>

  <!-- Tagline -->
  <text
    x="70" y="54"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="7.5" font-weight="400"
    fill="#C9A84C"
    letter-spacing="3.2"
    opacity="0.65"
  >AUTOMATE. SCALE. GROW.</text>

</svg>
