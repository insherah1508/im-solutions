<svg viewBox="0 0 380 56" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ══════════════════════════════════════════════ -->
  <!--  MARK — "IM" monogram inside an AI chip        -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- chip body -->
  <rect x="8" y="8" width="40" height="40" rx="9" fill="none" stroke="#C9A84C" stroke-width="1.8"/>
  <rect x="14" y="14" width="28" height="28" rx="5" fill="#C9A84C" fill-opacity="0.10"/>

  <!-- monogram -->
  <text x="28" y="35" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="700" fill="#C9A84C" text-anchor="middle" letter-spacing="0.5">IM</text>

  <!-- chip pins — top -->
  <line x1="18" y1="8" x2="18" y2="3" stroke="#C9A84C" stroke-width="1.6" opacity="0.6"/>
  <line x1="28" y1="8" x2="28" y2="3" stroke="#C9A84C" stroke-width="1.6" opacity="0.6"/>
  <line x1="38" y1="8" x2="38" y2="3" stroke="#C9A84C" stroke-width="1.6" opacity="0.6"/>
  <!-- chip pins — bottom -->
  <line x1="18" y1="48" x2="18" y2="53" stroke="#C9A84C" stroke-width="1.6" opacity="0.6"/>
  <line x1="28" y1="48" x2="28" y2="53" stroke="#C9A84C" stroke-width="1.6" opacity="0.6"/>
  <line x1="38" y1="48" x2="38" y2="53" stroke="#C9A84C" stroke-width="1.6" opacity="0.6"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--  WORDMARK                                      -->
  <!-- ══════════════════════════════════════════════ -->

  <text x="68" y="34" font-family="'Segoe UI',Arial,sans-serif" font-size="23" font-weight="600" fill="#F2F2F8" letter-spacing="3">SOLUTIONS</text>
  <text x="68" y="47" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" font-weight="400" fill="#C9A84C" letter-spacing="4.5" opacity="0.8">AUTOMATE · SCALE · GROW</text>

</svg>
